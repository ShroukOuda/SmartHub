<div class="app-shell">
  <app-header />
  <main class="app-shell__main">
    <router-outlet />
  </main>
  <app-footer />
</div>

<!-- Toast notifications -->
<div class="toasts">
  @for (notif of notifications.notifications(); track notif.id) {
    <div class="toast toast--{{ notif.type }}" (click)="notifications.dismiss(notif.id)">
      {{ notif.message }}
    </div>
  }
</div>
