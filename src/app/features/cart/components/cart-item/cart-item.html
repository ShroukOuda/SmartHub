<div class="cart-item">
  <a [routerLink]="['/products', item.product.id]">
    <img [src]="item.product.thumbnail" [alt]="item.product.name" class="cart-item__image" />
  </a>
  <div class="cart-item__details">
    <p class="cart-item__brand">{{ item.product.brand }}</p>
    <a [routerLink]="['/products', item.product.id]" class="cart-item__name">{{ item.product.name }}</a>
    <p class="cart-item__price">${{ item.product.price }}</p>
  </div>
  <div class="cart-item__actions">
    <div class="cart-item__qty">
      <button (click)="decrease()" class="qty-btn" [disabled]="item.quantity <= 1">−</button>
      <span>{{ item.quantity }}</span>
      <button (click)="increase()" class="qty-btn">+</button>
    </div>
    <span class="cart-item__subtotal">${{ (item.product.price * item.quantity).toFixed(2) }}</span>
    <button class="cart-item__remove" (click)="remove()" aria-label="Remove">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>
</div>
