<article class="product-card">
  <a [routerLink]="['/products', product.id]" class="product-card__link">
    <div class="product-card__image-wrap">
      <img [src]="product.thumbnail" [alt]="product.name" class="product-card__image" loading="lazy" />
      @if (product.isNew) {
        <span class="product-card__badge product-card__badge--new">New</span>
      }
      @if (product.discount) {
        <span class="product-card__badge product-card__badge--sale">-{{ product.discount }}%</span>
      }
    </div>
    <div class="product-card__body">
      <p class="product-card__brand">{{ product.brand }}</p>
      <h3 class="product-card__name">{{ product.name }}</h3>
      <app-star-rating [rating]="product.rating" size="sm" />
      <p class="product-card__reviews">{{ product.reviewCount }} reviews</p>
      <div class="product-card__pricing">
        <span class="product-card__price">${{ product.price }}</span>
        @if (product.originalPrice) {
          <span class="product-card__original">${{ product.originalPrice }}</span>
        }
      </div>
    </div>
  </a>
  <button class="product-card__cta" (click)="addToCart($event)">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
    </svg>
    Add to Cart
  </button>
</article>
